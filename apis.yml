  - name: Word Automation Services (SharePoint)
    description: >-
      Server-side document conversion and automation service for SharePoint.
      Supports batch conversion of Word documents to PDF, XPS, and other
      formats without user interaction.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
