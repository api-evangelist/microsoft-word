  - name: Open XML SDK for Word
    description: >-
      .NET library for programmatically creating and manipulating Word documents
      using the ECMA-376 Open XML standard. Provides strongly-typed classes for
      document structure, styles, tables, images, and content manipulation.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
